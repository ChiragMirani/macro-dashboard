name: Macro Dashboard Daily Refresh

on:
  workflow_dispatch:
  schedule:
    # Twice on US weekdays — 7:05 AM and 1:05 PM ET (11:05 / 17:05 UTC).
    - cron: "5 11 * * 1-5"
    - cron: "5 17 * * 1-5"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas requests jinja2 tzdata

      - name: Refresh Kalshi consensus
        run: python macro_site/build_kalshi_consensus.py

      - name: Render dashboard
        run: python macro_site/refresh_dashboard.py

      - name: Commit generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs macro_forecasting/output/kalshi_consensus_latest.json macro_site/latest_actuals_cache.json
          git diff --cached --quiet || git commit -m "Refresh macro dashboard"
          git push
